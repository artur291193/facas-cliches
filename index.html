<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busca de Facas — Relação de Portas Clichês</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3f;
    --accent: #f0c040;
    --accent2: #3a8ef5;
    --text: #e8eaf0;
    --muted: #6b7385;
    --red: #f04a4a;
    --green: #3ecf8e;
    --tag-rf: #f0c04022;
    --tag-rfborder: #f0c04066;
    --tag-mod: #3a8ef522;
    --tag-modborder: #3a8ef566;
    --tag-160: #3ecf8e22;
    --tag-160border: #3ecf8e66;
    --tag-turo: #ff780022;
    --tag-turoborder: #ff780066;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 20px 32px 16px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }
  header span {
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    padding-bottom: 4px;
  }

  /* Search area */
  .search-wrap {
    background: var(--surface);
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .search-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px 12px 42px;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active-pc  { border-color: #f0c040; color: #f0c040; background: var(--tag-rf); }
  .filter-btn.active-mod { border-color: #3a8ef5; color: #3a8ef5; background: var(--tag-mod); }
  .filter-btn.active-160 { border-color: #3ecf8e; color: #3ecf8e; background: var(--tag-160); }
  .filter-btn.active-all { border-color: var(--text); color: var(--text); background: var(--surface2); }
  .filter-btn.active-turo { border-color: #ff7800; color: #ff7800; background: var(--tag-turo); }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    padding: 8px 0;
  }
  .count-badge strong { color: var(--accent); }

  /* Results */
  .results {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s, transform 0.1s;
    cursor: default;
    animation: fadeUp 0.2s ease both;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .medida {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1;
  }
  .medida mark {
    background: #f0c04044;
    color: var(--accent);
    border-radius: 3px;
    padding: 0 2px;
  }

  .tag-tabela {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tag-PC  { background: var(--tag-rf);  border: 1px solid var(--tag-rfborder);  color: #f0c040; }
  .tag-MOD { background: var(--tag-mod); border: 1px solid var(--tag-modborder); color: #3a8ef5; }
  .tag-160 { background: var(--tag-160); border: 1px solid var(--tag-160border); color: #3ecf8e; }
  .tag-TURO { background: var(--tag-turo); border: 1px solid var(--tag-turoborder); color: #ff7800; }

  .card-info {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .info-label {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info-value {
    font-size: 0.9rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }
  .info-value.highlight { color: var(--accent); font-weight: 500; }

  .card-actions {
    display: flex;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .btn-edit, .btn-delete {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-edit {
    background: transparent;
    border-color: #3a8ef544;
    color: #3a8ef5;
  }
  .btn-edit:hover { background: #3a8ef522; border-color: #3a8ef5; }
  .btn-delete {
    background: transparent;
    border-color: #f04a4a44;
    color: var(--red);
  }
  .btn-delete:hover { background: #f04a4a22; border-color: var(--red); }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
  }
  .empty svg { margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 1rem; }
  .empty small { font-size: 0.8rem; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<header>
  <h1>⚔ FACAS / CLICHÊS</h1>
  <span>RELAÇÃO DE PORTAS CLICHÊS · BUSCA RÁPIDA</span>
  <button id="btnAdicionar" onclick="abrirModal()" style="margin-left:auto;background:var(--accent);color:#111;border:none;border-radius:8px;padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity 0.15s;" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    NOVO FERRAMENTAL
  </button>
</header>

<!-- MODAL ADICIONAR -->
<div id="modal" style="display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:32px;width:100%;max-width:460px;margin:16px;box-shadow:0 24px 60px #000a;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--accent);letter-spacing:1px;">+ NOVO FERRAMENTAL</h2>
      <button onclick="fecharModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;line-height:1;">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Tabela *</label>
        <select id="f_tabela" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;">
          <option value="PORTA-CLICHE">PORTA-CLICHE</option>
          <option value="MODULAR">MODULAR</option>
          <option value="REINA FLEX 160">REINA FLEX 160</option>
          <option value="TURO">TURO</option>
        </select>
      </div>
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Medida *</label>
        <input id="f_medida" type="text" placeholder="ex: 100X150 ou Z 68" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Z</label>
          <input id="f_z" type="text" placeholder="ex: 48" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div>
          <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Nº</label>
          <input id="f_n" type="text" placeholder="ex: 161" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        </div>
      </div>
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">OBS / QTDE</label>
        <input id="f_obs" type="text" placeholder="ex: 1C, SERRILHA, QTDE: 3..." style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      </div>
    </div>

    <div id="modal_erro" style="display:none;color:var(--red);font-size:0.8rem;font-family:'DM Mono',monospace;margin-top:12px;"></div>

    <div style="display:flex;gap:10px;margin-top:24px;">
      <button onclick="fecharModal()" style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;">Cancelar</button>
      <button onclick="salvarNovo()" style="flex:2;background:var(--accent);border:none;border-radius:8px;padding:12px;color:#111;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;">ADICIONAR</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" style="display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1.5px solid #3a8ef5;border-radius:14px;padding:32px;width:100%;max-width:460px;margin:16px;box-shadow:0 24px 60px #000a;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#3a8ef5;letter-spacing:1px;">✎ EDITAR FERRAMENTAL</h2>
      <button onclick="fecharModalEditar()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;line-height:1;">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Tabela</label>
        <select id="e_tabela" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;">
          <option value="PORTA-CLICHE">PORTA-CLICHE</option>
          <option value="MODULAR">MODULAR</option>
          <option value="REINA FLEX 160">REINA FLEX 160</option>
          <option value="TURO">TURO</option>
        </select>
      </div>
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Medida *</label>
        <input id="e_medida" type="text" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='#3a8ef5'" onblur="this.style.borderColor='var(--border)'">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Z / Carreira</label>
          <input id="e_z" type="text" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='#3a8ef5'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div>
          <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">Nº</label>
          <input id="e_n" type="text" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='#3a8ef5'" onblur="this.style.borderColor='var(--border)'">
        </div>
      </div>
      <div>
        <label style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">OBS / QTDE</label>
        <input id="e_obs" type="text" style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;" onfocus="this.style.borderColor='#3a8ef5'" onblur="this.style.borderColor='var(--border)'">
      </div>
    </div>
    <div id="editar_erro" style="display:none;color:var(--red);font-size:0.8rem;font-family:'DM Mono',monospace;margin-top:12px;"></div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button onclick="fecharModalEditar()" style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;">Cancelar</button>
      <button onclick="salvarEdicao()" style="flex:2;background:#3a8ef5;border:none;border-radius:8px;padding:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;">SALVAR</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR APAGAR -->
<div id="modalApagar" style="display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1.5px solid var(--red);border-radius:14px;padding:32px;width:100%;max-width:400px;margin:16px;box-shadow:0 24px 60px #000a;text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:12px;">🗑</div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--red);letter-spacing:1px;margin-bottom:8px;">APAGAR FERRAMENTAL?</h2>
    <p id="apagar_desc" style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.85rem;margin-bottom:24px;"></p>
    <div style="display:flex;gap:10px;">
      <button onclick="fecharModalApagar()" style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;">Cancelar</button>
      <button onclick="confirmarApagar()" style="flex:1;background:var(--red);border:none;border-radius:8px;padding:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;">APAGAR</button>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar por medida, Z, obs... ex: 100X150 ou 48" autofocus>
    </div>
    <div class="filters">
      <button class="filter-btn active-all" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="PORTA-CLICHE">PORTA-CLICHE</button>
      <button class="filter-btn" data-filter="MODULAR">MODULAR</button>
      <button class="filter-btn" data-filter="REINA FLEX 160">REINA FLEX 160</button>
      <button class="filter-btn" data-filter="TURO">TURO</button>
    </div>
  </div>
  <div class="count-badge" id="countBadge" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">Mostrando <strong id="countNum">0</strong> resultados<span id="sync-status" style="font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--muted);">⏳ Conectando...</span></div>
</div>

async function loadAllSheets() {
  const status = document.getElementById('sync-status');

  // Se aberto como arquivo local usa dados embutidos
  if (location.protocol === 'file:') {
    DATA = BACKUP_DATA;
    status.textContent = '📦 Modo offline — dados locais';
    status.style.color = '#f0c040';
    render(document.getElementById('searchInput').value);
    return;
  }

  status.textContent = '🔄 Sincronizando com Google Sheets...';
  status.style.color = 'var(--muted)';
  document.getElementById('results').innerHTML = '<div class="empty"><p>⏳ Carregando dados...</p></div>';
  document.getElementById('countNum').textContent = '...';

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const resp = await fetch('https://script.google.com/macros/s/AKfycbwZAnNeFLcsA8yJpWiDBEPhlAOJYtWQPCPAik-C2L3h5BUjuBDEHDBv5iZC1T-29KEC/exec', { signal: controller.signal });
    clearTimeout(timer);
    const online = await resp.json();
    if (online && online.length > 0) {
      DATA = online;
      const now = new Date().toLocaleTimeString('pt-BR');
      status.textContent = '✅ Sincronizado às ' + now + ' (' + DATA.length + ' itens)';
      status.style.color = 'var(--green)';
    } else {
      throw new Error('vazio');
    }
  } catch(e) {
    DATA = BACKUP_DATA;
    status.textContent = '⚠️ Sem conexão — usando dados locais';
    status.style.color = '#f0c040';
  }
  render(document.getElementById('searchInput').value);
}

let activeFilter = 'all';

function tagClass(tabela) {
  if (tabela === 'PORTA-CLICHE') return 'PC';
  if (tabela === 'MODULAR') return 'MOD';
  if (tabela === 'TURO') return 'TURO';
  return '160';
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render(query) {
  const q = query.trim().toUpperCase();
  const results = document.getElementById('results');
  const filtered = DATA.filter(d => {
    const matchFilter = activeFilter === 'all' || d.tabela === activeFilter;
    if (!matchFilter) return false;
    if (!q) return true;
    return (
      d.medida.toUpperCase().includes(q) ||
      d.z.toString().includes(q) ||
      d.obs.toUpperCase().includes(q) ||
      d.n.toString().includes(q)
    );
  });

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    results.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Nenhum resultado encontrado</p>
      <small>Tente buscar por medida (ex: 100X150), Z (ex: 48) ou OBS (ex: SERRILHA)</small>
    </div>`;
    return;
  }

  results.innerHTML = filtered.map((d, i) => {
    const tc = tagClass(d.tabela);
    const mh = highlight(d.medida, q);
    const zh = highlight(d.z, q);
    const oh = highlight(d.obs, q);
    const delay = Math.min(i * 20, 300);

    let infoHtml = '';
    if (d.n) infoHtml += `<div class="info-item"><span class="info-label">Nº</span><span class="info-value">${d.n}</span></div>`;
    infoHtml += `<div class="info-item"><span class="info-label">Z</span><span class="info-value highlight">${zh}</span></div>`;
    if (d.obs && !d.obs.startsWith('QTDE:')) {
      infoHtml += `<div class="info-item"><span class="info-label">OBS</span><span class="info-value">${oh}</span></div>`;
    }
    if (d.qtde) {
      infoHtml += `<div class="info-item"><span class="info-label">QTDE</span><span class="info-value highlight">${d.qtde}</span></div>`;
    }

    const realIdx = DATA.indexOf(d);
    return `<div class="card" style="animation-delay:${delay}ms">
      <div class="card-top">
        <div class="medida">${mh}</div>
        <span class="tag-tabela tag-${tc}">${d.tabela}</span>
      </div>
      <div class="card-info">${infoHtml}</div>
      <div class="card-actions">
        <button class="btn-edit" onclick="abrirEditar(${realIdx})" title="Editar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>
        <button class="btn-delete" onclick="abrirApagar(${realIdx})" title="Apagar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Apagar
        </button>
      </div>
    </div>`;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    activeFilter = btn.dataset.filter;
    if (activeFilter === 'all') btn.classList.add('active-all');
    else if (activeFilter === 'PORTA-CLICHE') btn.classList.add('active-pc');
    else if (activeFilter === 'MODULAR') btn.classList.add('active-mod');
    else if (activeFilter === 'TURO') btn.classList.add('active-turo');
    else btn.classList.add('active-160');
    render(document.getElementById('searchInput').value);
  });
});

// Modal
function abrirModal() {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('f_medida').focus();
}
function fecharModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modal_erro').style.display = 'none';
  ['f_medida','f_z','f_n','f_obs'].forEach(id => {
    document.getElementById(id).value = '';
  });
}
function salvarNovo() {
  const tabela = document.getElementById('f_tabela').value.trim();
  const medida = document.getElementById('f_medida').value.trim().toUpperCase();
  const z      = document.getElementById('f_z').value.trim();
  const n      = document.getElementById('f_n').value.trim();
  const obs    = document.getElementById('f_obs').value.trim().toUpperCase();
  const erro   = document.getElementById('modal_erro');
  if (!medida) { erro.textContent = '⚠ O campo Medida é obrigatório.'; erro.style.display = 'block'; return; }
  erro.style.display = 'none';
  DATA.push({ tabela, n, medida, z, obs, qtde: '' });
  fecharModal();
  render(document.getElementById('searchInput').value);
  const btn = document.getElementById('btnAdicionar');
  const orig = btn.innerHTML;
  btn.innerHTML = '✓ ADICIONADO';
  btn.style.background = 'var(--green)';
  setTimeout(() => { btn.innerHTML = orig; btn.style.background = 'var(--accent)'; }, 2000);
}
let editIdx = null;
let deleteIdx = null;

function abrirEditar(idx) {
  editIdx = idx;
  const d = DATA[idx];
  document.getElementById('e_tabela').value = d.tabela;
  document.getElementById('e_medida').value = d.medida;
  document.getElementById('e_z').value = d.z;
  document.getElementById('e_n').value = d.n;
  document.getElementById('e_obs').value = d.obs;
  document.getElementById('editar_erro').style.display = 'none';
  document.getElementById('modalEditar').style.display = 'flex';
}
function fecharModalEditar() {
  document.getElementById('modalEditar').style.display = 'none';
  editIdx = null;
}
function salvarEdicao() {
  const medida = document.getElementById('e_medida').value.trim().toUpperCase();
  if (!medida) {
    const e = document.getElementById('editar_erro');
    e.textContent = '⚠ O campo Medida é obrigatório.';
    e.style.display = 'block';
    return;
  }
  DATA[editIdx] = {
    tabela: document.getElementById('e_tabela').value,
    medida: medida,
    z: document.getElementById('e_z').value.trim(),
    n: document.getElementById('e_n').value.trim(),
    obs: document.getElementById('e_obs').value.trim().toUpperCase(),
    qtde: DATA[editIdx].qtde
  };
  fecharModalEditar();
  render(document.getElementById('searchInput').value);
}

function abrirApagar(idx) {
  deleteIdx = idx;
  const d = DATA[idx];
  document.getElementById('apagar_desc').textContent = `Nº ${d.n} · ${d.medida} · ${d.tabela}`;
  document.getElementById('modalApagar').style.display = 'flex';
}
function fecharModalApagar() {
  document.getElementById('modalApagar').style.display = 'none';
  deleteIdx = null;
}
function confirmarApagar() {
  DATA.splice(deleteIdx, 1);
  fecharModalApagar();
  render(document.getElementById('searchInput').value);
}

document.getElementById('modalEditar').addEventListener('click', function(e) { if (e.target === this) fecharModalEditar(); });
document.getElementById('modalApagar').addEventListener('click', function(e) { if (e.target === this) fecharModalApagar(); });

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { fecharModal(); fecharModalEditar(); fecharModalApagar(); } });

</script>
